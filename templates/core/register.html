{% extends 'base.html' %}

{% block title %}Join Free | BillPro{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 3rem auto;">
    <div class="content-card">
        <h2 style="text-align: center; font-size: 2rem; margin-bottom: 2rem; color: var(--primary);">Secure Free Account</h2>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    <input type="{% if 'password' in field.name %}password{% elif field.name == 'email' %}email{% else %}text{% endif %}" name="{{ field.name }}" id="{{ field.id_for_label }}" required>
                    {% if field.errors %}
                        <p style="color: #ff4d4d; font-size: 0.8rem; margin-top: 0.3rem;">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; margin-top: 1rem; font-size: 1.1rem;">Create Account</button>
        </form>
        <p style="text-align: center; margin-top: 2rem; color: rgba(255,255,255,0.6);">Already have an account? <a href="{% url 'login' %}" style="color: var(--primary); text-decoration: none;">Log In</a></p>
    </div>
</div>
{% endblock %}
